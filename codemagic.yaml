# Luxora AI — CI/CD (Codemagic)
# Add a new Application in Codemagic → this repo → enable codemagic.yaml.
# Reuse group `appstore_credentials` (APP_STORE_CONNECT_*) from Discipline.
#
# Add these Secrets to appstore_credentials (iOS) and google_play (Android):
#   UNSPLASH_ACCESS_KEY
#   SUPABASE_URL          e.g. https://YOUR_PROJECT.supabase.co
#   SUPABASE_ANON_KEY     anon or sb_publishable_ key from Supabase
# Do NOT add OPENAI_API_KEY here — it lives only in Supabase Edge Function secrets.

workflows:
  luxora-ios-workflow:
    name: Luxora AI iOS
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.luxora.luxoraAi
      groups:
        - appstore_credentials
      vars:
        XCODE_SCHEME: Runner
        BUNDLE_ID: com.luxora.luxoraAi
        APP_BUILD_NAME: "0.1.0"
        APP_BUILD_NUMBER: "2"
        # Edge function slug in Supabase (dashboard may auto-name; ours is bright-processor).
        SUPABASE_CONCIERGE_FUNCTION: "bright-processor"

    scripts:
      - name: Install dependencies
        script: flutter pub get

      - name: Generate iOS localization bundles
        script: dart run tool/generate_ios_lproj_localizations.dart

      - name: Build IPA
        script: |
          set -euo pipefail
          mkdir -p build
          cat > build/dart_defines.json <<EOF
          {"UNSPLASH_ACCESS_KEY":"${UNSPLASH_ACCESS_KEY:-}","SUPABASE_URL":"${SUPABASE_URL:-}","SUPABASE_ANON_KEY":"${SUPABASE_ANON_KEY:-}","SUPABASE_CONCIERGE_FUNCTION":"${SUPABASE_CONCIERGE_FUNCTION:-bright-processor}"}
          EOF
          flutter build ipa --release \
            --build-name="$APP_BUILD_NAME" \
            --build-number="$APP_BUILD_NUMBER" \
            --dart-define-from-file=build/dart_defines.json

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true

  luxora-android-workflow:
    name: Luxora AI Android
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      flutter: stable
      android_signing:
        - keystore_reference
      groups:
        - google_play
      vars:
        PACKAGE_NAME: com.luxora.luxora_ai
        APP_BUILD_NAME: "0.1.0"
        APP_BUILD_NUMBER: "2"
        SUPABASE_CONCIERGE_FUNCTION: "bright-processor"

    scripts:
      - name: Install dependencies
        script: flutter pub get

      - name: Build AAB
        script: |
          set -euo pipefail
          mkdir -p build
          cat > build/dart_defines.json <<EOF
          {"UNSPLASH_ACCESS_KEY":"${UNSPLASH_ACCESS_KEY:-}","SUPABASE_URL":"${SUPABASE_URL:-}","SUPABASE_ANON_KEY":"${SUPABASE_ANON_KEY:-}","SUPABASE_CONCIERGE_FUNCTION":"${SUPABASE_CONCIERGE_FUNCTION:-bright-processor}"}
          EOF
          flutter build appbundle --release \
            --build-name="$APP_BUILD_NAME" \
            --build-number="$APP_BUILD_NUMBER" \
            --dart-define-from-file=build/dart_defines.json

    artifacts:
      - build/**/outputs/**/*.aab
