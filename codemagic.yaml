# Luxora AI — CI/CD (Codemagic)
# Add a new Application in Codemagic → this repo → enable codemagic.yaml.
# Reuse group `appstore_credentials` (APP_STORE_CONNECT_*) from Discipline.
# Add UNSPLASH_ACCESS_KEY to that group (Secret) for production image builds.

workflows:
  luxora-ios-workflow:
    name: Luxora AI iOS
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.luxora.luxoraAi
      groups:
        - appstore_credentials
      vars:
        XCODE_SCHEME: Runner
        BUNDLE_ID: com.luxora.luxoraAi
        APP_BUILD_NAME: "0.1.0"
        APP_BUILD_NUMBER: "2"

    scripts:
      - name: Install dependencies
        script: flutter pub get

      - name: Generate iOS localization bundles
        script: dart run tool/generate_ios_lproj_localizations.dart

      - name: Build IPA
        script: |
          set -euo pipefail
          # UNSPLASH_ACCESS_KEY from Codemagic env (do not commit secrets).
          cat > build/dart_defines.json <<EOF
          {"UNSPLASH_ACCESS_KEY":"${UNSPLASH_ACCESS_KEY:-}"}
          EOF
          flutter build ipa --release \
            --build-name="$APP_BUILD_NAME" \
            --build-number="$APP_BUILD_NUMBER" \
            --dart-define-from-file=build/dart_defines.json

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true

  luxora-android-workflow:
    name: Luxora AI Android
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      flutter: stable
      android_signing:
        - keystore_reference
      groups:
        - google_play
      vars:
        PACKAGE_NAME: com.luxora.luxora_ai
        APP_BUILD_NAME: "0.1.0"
        APP_BUILD_NUMBER: "2"

    scripts:
      - name: Install dependencies
        script: flutter pub get

      - name: Build AAB
        script: |
          set -euo pipefail
          cat > build/dart_defines.json <<EOF
          {"UNSPLASH_ACCESS_KEY":"${UNSPLASH_ACCESS_KEY:-}"}
          EOF
          flutter build appbundle --release \
            --build-name="$APP_BUILD_NAME" \
            --build-number="$APP_BUILD_NUMBER" \
            --dart-define-from-file=build/dart_defines.json

    artifacts:
      - build/**/outputs/**/*.aab
